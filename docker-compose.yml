version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: pulsekeep-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: pulsekeep-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/pulsekeep
    ports:
      - "5000:5000"
    depends_on:
      - mongo

volumes:
  mongo_data:
